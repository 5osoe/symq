<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SymQ | الرموز والاختصارات</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="backdrop" class="backdrop"></div>

    <header class="app-header">
        <div class="header-container">

            <!-- Brand -->
            <div class="brand">
                <span class="logo-text">SymQ</span>
            </div>

            <!-- Desktop Search -->
            <div class="search-bar-container" id="searchContainer">
                <input type="text" id="searchInput" placeholder="بحث (مثال: نسخ، F5)..." autocomplete="off">
                <div class="search-icon">/</div>
            </div>

            <!-- Desktop Controls (right side) -->
            <div class="desktop-controls">
                <button id="darkToggle" class="ctrl-btn" title="الوضع الليلي" aria-label="تبديل الوضع الليلي">
                    <!-- icon injected by JS -->
                </button>
                <button id="langToggle" class="ctrl-btn lang-btn" title="Switch language" aria-label="تبديل اللغة">EN</button>
            </div>

            <!-- Mobile Controls -->
            <div class="mobile-controls">
                <button id="mobileSearchToggle" class="icon-btn-mobile" aria-label="بحث">
                    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                </button>
                <button id="darkToggleMobile" class="icon-btn-mobile" aria-label="وضع ليلي">
                    <!-- icon injected by JS -->
                </button>
                <button id="langToggleMobile" class="icon-btn-mobile lang-btn-mobile" aria-label="تبديل اللغة">EN</button>
                <button id="mobileFilterBtn" class="icon-btn-mobile filter-icon-btn" aria-label="التصنيفات">
                    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="10" y1="18" x2="14" y2="18"/></svg>
                </button>
            </div>
        </div>
    </header>

    <div class="layout-container">

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3 id="sidebarTitle">تصفح الأقسام</h3>
                <button id="closeSidebar" class="close-btn">&times;</button>
            </div>
            <div id="sidebarContent" class="sidebar-content"></div>
        </aside>

        <main class="content-area">
            <div class="content-header">
                <div class="title-group">
                    <h1 id="activeCategoryTitle">الكل</h1>
                    <span id="itemCount" class="count-badge">0 عنصر</span>
                </div>
            </div>

            <div id="symbolsGrid" class="grid"></div>

            <div id="emptyState" class="empty-state hidden">
                <p>لا توجد نتائج مطابقة.</p>
                <button id="resetSearch" class="btn-text">عرض الكل</button>
            </div>
        </main>

    </div>

    <button id="backToTop" class="back-to-top" aria-label="العودة للأعلى">↑</button>

    <!-- Data -->
    <script src="symbols-diacritics.js"></script>
    <script src="symbols-punctuation.js"></script>
    <script src="symbols-math.js"></script>
    <script src="symbols-supersub.js"></script>
    <script src="symbols-currency.js"></script>
    <script src="shortcuts-windows.js"></script>
    <script src="shortcuts-editing.js"></script>
    <script src="shortcuts-word.js"></script>
    <script src="shortcuts-excel.js"></script>
    <script src="shortcuts-powerpoint.js"></script>
    <script src="shortcuts-browser.js"></script>
    <script src="shortcuts-explorer.js"></script>
    <script src="shortcuts-photoshop.js"></script>
    <script src="shortcuts-illustrator.js"></script>
    <script src="shortcuts-vscode.js"></script>
    <script src="shortcuts-terminal.js"></script>
    <script src="shortcuts-autocad.js"></script>
    <script src="shortcuts-premiere.js"></script>
    <script src="app.js"></script>

</body>
</html>
