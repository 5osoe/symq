<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SymQ | رموز واختصارات لوحة المفاتيح</title>
    
    <!-- Fonts: Cairo for Arabic/English Modern look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons: Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="container nav-content">
            <div class="logo">
                <div class="logo-icon">Q</div>
                <span>SymQ</span>
            </div>
            <div class="nav-links">
                <a href="#" class="active">الرئيسية</a>
                <a href="#categories">التصنيفات</a>
                <a href="#" onclick="copyLink()">مشاركة</a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero">
        <div class="container hero-content">
            <h1>كل الرموز والاختصارات <br><span class="highlight">في مكان واحد</span></h1>
            <p class="subtitle">فهرس شامل للرموز العربية، التشكيل، علامات الترقيم، واختصارات الويندوز.</p>
            
            <div class="search-wrapper">
                <i class="ph ph-magnifying-glass search-icon"></i>
                <input type="text" id="searchInput" placeholder="ابحث عن رمز، اسم، اختصار، أو كود (مثال: فتحة، Alt+0169)...">
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container main-layout">
        
        <!-- Categories Sidebar / Tabs -->
        <aside class="categories-panel">
            <h3>التصنيفات</h3>
            <ul id="categoryList">
                <!-- Injected via JS -->
            </ul>
        </aside>

        <!-- Grid Content -->
        <section class="content-panel">
            <div class="header-flex">
                <h2 id="currentCategoryTitle">جميع الرموز</h2>
                <span class="count-badge" id="itemCount">0 عنصر</span>
            </div>

            <div id="symbolsGrid" class="grid-container">
                <!-- Cards Injected via JS -->
            </div>
            
            <div id="noResults" class="hidden">
                <i class="ph ph-smiley-sad"></i>
                <p>لم يتم العثور على نتائج مطابقة.</p>
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>© 2024 SymQ. مصمم للمحترفين.</p>
        </div>
    </footer>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <i class="ph ph-check-circle"></i>
        <span>تم النسخ بنجاح!</span>
    </div>

    <!-- Scripts -->
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
