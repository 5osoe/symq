    <!-- ═══════════════════════════════════════
         PWA & SERVICE WORKER REGISTRATION
    ═══════════════════════════════════════ -->
    <script>
    (function() {
      'use strict';

      // ── Service Worker Registration ──────────────────────────────────────────
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(reg => {
              // Check for updates every 60 seconds
              setInterval(() => reg.update(), 60000);

              reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    // New version available - could show update notification here
                    console.log('[SymQ] تحديث جديد متاح');
                  }
                });
              });
            })
            .catch(err => console.warn('[SymQ] Service Worker error:', err));
        });
      }

      // ── PWA Install Banner ───────────────────────────────────────────────────
      let deferredPrompt = null;
      const banner = document.getElementById('pwaInstallBanner');
      const installBtn = document.getElementById('pwaInstallBtn');
      const dismissBtn = document.getElementById('pwaInstallDismiss');

      // Don't show if already installed or dismissed
      const dismissed = sessionStorage.getItem('pwa-dismissed');
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches
        || window.navigator.standalone === true;

      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;

        if (!dismissed && !isStandalone) {
          setTimeout(() => {
            banner && banner.classList.remove('hidden');
          }, 3000);
        }
      });

      installBtn && installBtn.addEventListener('click', async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        deferredPrompt = null;
        banner && banner.classList.add('hidden');
        console.log('[SymQ] PWA install outcome:', outcome);
      });

      dismissBtn && dismissBtn.addEventListener('click', () => {
        banner && banner.classList.add('hidden');
        sessionStorage.setItem('pwa-dismissed', '1');
      });

      window.addEventListener('appinstalled', () => {
        banner && banner.classList.add('hidden');
        deferredPrompt = null;
        console.log('[SymQ] تم تثبيت التطبيق بنجاح');
      });

      // ── Update URL params on search (for SEO-friendly sharing) ──────────────
      const searchInput = document.getElementById('searchInput');
      if (searchInput) {
        const params = new URLSearchParams(window.location.search);
        const q = params.get('q');
        if (q) searchInput.value = q;
      }
    })();
    </script>
