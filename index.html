<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SymQ | الرموز والاختصارات</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Backdrop for Mobile Sidebar -->
    <div id="backdrop" class="backdrop"></div>

    <!-- Header -->
    <header class="app-header">
        <div class="header-container">
            <div class="brand">
                <span class="logo-text">SymQ</span>
            </div>
            
            <!-- Search Container -->
            <div class="search-bar-container" id="searchContainer">
                <input type="text" id="searchInput" placeholder="بحث (مثال: نسخ، F5)..." autocomplete="off">
                <div class="search-icon">/</div>
                <!-- Clear button injected via JS -->
            </div>

            <!-- Mobile Controls -->
            <div class="mobile-controls">
                <button id="mobileSearchToggle" class="icon-btn-mobile" aria-label="بحث">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
                <!-- Dark Mode Toggle -->
                <button id="darkModeBtn" class="icon-btn-mobile" aria-label="تغيير الوضع">
                    <svg id="iconMoon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    <svg id="iconSun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                </button>
                <!-- Filter Icon Button -->
                <button id="mobileFilterBtn" class="icon-btn-mobile" aria-label="التصنيفات">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Layout -->
    <div class="layout-container">
        
        <!-- Sidebar / Bottom Sheet -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>تصفح الأقسام</h3>
                <button id="closeSidebar" class="close-btn">&times;</button>
            </div>
            <div id="sidebarContent" class="sidebar-content">
                <!-- Injected via JS -->
            </div>
        </aside>

        <!-- Content -->
        <main class="content-area">
            <div class="content-header">
                <div class="title-group">
                    <h1 id="activeCategoryTitle">الكل</h1>
                    <span id="itemCount" class="count-badge">0 عنصر</span>
                </div>
                <!-- Sub Filter Dropdown Injected via JS -->
            </div>

            <div id="symbolsGrid" class="grid">
                <!-- Cards Injected via JS -->
            </div>
            
            <div id="emptyState" class="empty-state hidden">
                <p>لا توجد نتائج مطابقة.</p>
                <button id="resetSearch" class="btn-text">عرض الكل</button>
            </div>
        </main>

    </div>

    <!-- Back to Top Button -->
    <button id="backToTop" class="back-to-top" aria-label="العودة للأعلى">↑</button>

    <!-- Dark Mode Loading Overlay -->
    <div id="themeOverlay" class="theme-overlay">
        <div class="theme-spinner"></div>
    </div>

    <!-- Data Files -->
    <script src="symbols-diacritics.js"></script>
    <script src="symbols-punctuation.js"></script>
    <script src="symbols-math.js"></script>
    <script src="symbols-supersub.js"></script>
    <script src="symbols-currency.js"></script>
    
    <script src="shortcuts-windows.js"></script>
    <script src="shortcuts-editing.js"></script>
    <script src="shortcuts-word.js"></script>
    <script src="shortcuts-excel.js"></script>
    <script src="shortcuts-powerpoint.js"></script>
    <script src="shortcuts-browser.js"></script>
    <script src="shortcuts-explorer.js"></script>
    <script src="shortcuts-photoshop.js"></script>
    <script src="shortcuts-illustrator.js"></script>
    <script src="shortcuts-vscode.js"></script>
    <script src="shortcuts-terminal.js"></script>
    <script src="shortcuts-autocad.js"></script>
    <script src="shortcuts-premiere.js"></script>
    
    <!-- Logic -->
    <script src="app.js"></script>

</body>
</html>
